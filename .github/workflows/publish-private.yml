name: Publish to Private Registry

on:
  release:
    types: [published]

concurrency:
  group: publish-private-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Build
        run: pnpm build

      - name: Configure private registry auth
        run: |
          echo "//npmlib.amybot.ai/:_authToken=${PRIVATE_NPM_TOKEN}" > .npmrc
        env:
          PRIVATE_NPM_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}

      - name: Rename package for private registry
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@amybot/openclaw';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to private registry
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm publish --registry https://npmlib.amybot.ai/ --access restricted --no-git-checks

      - name: Verify
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Published @amybot/openclaw@${VERSION} to https://npmlib.amybot.ai/"
