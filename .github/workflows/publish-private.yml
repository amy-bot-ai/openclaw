name: Publish to Private Registry

on:
  push:
    tags:
      # Match stable release tags only (e.g. v2026.3.7), skip beta/prerelease
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v2026.3.7)"
        required: true
        type: string

concurrency:
  group: publish-private-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PUBLISH_REF: ${{ github.event.inputs.tag || github.ref }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}
          submodules: false

      - name: Fetch workflow files from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Build
        run: pnpm build

      - name: Configure private registry auth
        run: |
          echo "//npmlib.amybot.ai/:_authToken=${PRIVATE_NPM_TOKEN}" > .npmrc
        env:
          PRIVATE_NPM_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}

      - name: Rebrand package for private registry
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const glob = require('glob');

            // 1. Rename package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@amybot/openclaw';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

            // 2. Patch CORE_PACKAGE_NAMES in dist to recognize the rebranded name
            const distFiles = glob.sync('dist/**/*.js');
            let patched = 0;
            for (const file of distFiles) {
              let content = fs.readFileSync(file, 'utf8');
              if (content.includes('new Set([\"openclaw\"])')) {
                content = content.replace(
                  /new Set\(\[\"openclaw\"\]\)/g,
                  'new Set([\"openclaw\", \"@amybot/openclaw\"])'
                );
                fs.writeFileSync(file, content);
                patched++;
              }
            }
            console.log('Patched CORE_PACKAGE_NAMES in ' + patched + ' dist files');
          "

      - name: Publish to private registry
        run: |
          set -euo pipefail
          VERSION="${PUBLISH_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          npm publish --registry https://npmlib.amybot.ai/ --access restricted --no-git-checks

      - name: Verify
        run: |
          VERSION="${PUBLISH_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          echo "Published @amybot/openclaw@${VERSION} to https://npmlib.amybot.ai/"
