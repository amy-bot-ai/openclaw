name: Publish to Private Registry

on:
  push:
    tags:
      # Match stable release tags only (e.g. v2026.3.7), skip beta/prerelease
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: publish-private-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          submodules: false

      - name: Fetch workflow files from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Build
        run: pnpm build

      - name: Configure private registry auth
        run: |
          echo "//npmlib.amybot.ai/:_authToken=${PRIVATE_NPM_TOKEN}" > .npmrc
        env:
          PRIVATE_NPM_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}

      - name: Rename package for private registry
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@amybot/openclaw';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to private registry
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm publish --registry https://npmlib.amybot.ai/ --access restricted --no-git-checks

      - name: Verify
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Published @amybot/openclaw@${VERSION} to https://npmlib.amybot.ai/"
